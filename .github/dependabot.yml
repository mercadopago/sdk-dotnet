# Dependabot version updates — sdk-dotnet
# Ubicación obligatoria: .github/dependabot.yml
# Ecosistemas: nuget (.NET) + github-actions
version: 2

updates:
  # ── .NET / NuGet ─────────────────────────────────────────────────────
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Bogota"
    open-pull-requests-limit: 5
    assignees:
      - "luismeli10"
      - "orojaspardo"
      - "barajas-d"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions (CI) ──────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Bogota"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
